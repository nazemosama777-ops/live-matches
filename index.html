<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر للمباريات</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-3xl bg-gray-800 rounded-lg p-6 shadow-2xl border border-gray-700">
        <h1 class="text-xl font-bold text-center text-emerald-400 mb-4">📺 شاشة البث المباشر للمباراة</h1>
        
        <div class="relative aspect-video bg-black rounded-md overflow-hidden shadow-lg">
            <video id="video" class="w-full h-full" controls autoplay playsinline></video>
        </div>
        
        <p class="text-sm text-center text-gray-400 mt-4">لو البث قطع اعمل ريفرش للصفحة </p>
    </div>
    <br>
        <p>Created By Dev Nazem Osama &copy;</p>
    <script>
        const streamUrl = "https://live.kooraa4.cfd/rooma1_480/index.m3u8";
        const video = document.getElementById('video');

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(err => {
                    console.log("المتصفح يطلب ضغط زر التشغيل يدوياً لبدء الفيديو.");
                });
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('canplay', function() {
                video.play();
            });
        }
    </script>
</body>
</html>
